<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let i=1;
        var n = 5;
        while(i<=10) {
            document.write("5 * "+ i + " = " + n * i + "<br>");
            i++;
        }

        document.write("<br>=================================================<br>");
        i=1;
        do {
            document.write("5 * "+ i + " = " + n * i + "<br>");
            i++;
        } while(i<=10);

        document.write("<br>=================================================<br>");
        for(let i=1; i<=10; i++) {
            document.write("5 * "+ i + " = " + n * i + "<br>");
        }


        document.write("<br>=================================================<br>");

        for(let i=5; i>=1; i--) {
            for(let j=5; j>=6-i; j--) {
                document.write(j);
            }
            document.write("<br>");
        }


        document.write("<br>=================================================<br>");

        for(let i=5; i>=1; i--) {
            for(let j=5; j>=6-i; j--) {
                document.write("*");
            }
            document.write("<br>");
        }


        document.write("<br>=================================================<br>");

        function minPrice(){
            var product_prics=[10, 20, 30, 50, 40]
            var temp = product_prics[0]

            for(var i=0; i<product_prics.length; i++){
                if(product_prics[i]<temp){
                    temp = product_prics[i]

                }

            }
            document.write("minimum price of the products : "+temp);
        }
        minPrice();

        document.write("<br>=================================================<br>");

        function countPositiveAndNegative() {
            var numbers = [10, -5, 20, -10, 30];
            var positiveCount = 0;
            var negativeCount = 0;

            for(var i=0; i<numbers.length; i++){
                if(numbers[i] > 0){
                    positiveCount++;
                } else if(numbers[i] < 0){
                    negativeCount++;
                }
            }

            document.write("positiveCount: " + positiveCount + "<br>");
            document.write("negativeCount: " + negativeCount + "<br>");
        }
        countPositiveAndNegative();

        document.write("<br>=================================================<br>");

    </script>
</head>
<body>
    
    <script src="/js/loop.js"></script>
</body>
</html>
