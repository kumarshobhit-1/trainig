<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background-color: #C9C5D3;
        }

        .container{
            width:700px;
            text-align:center;
        }

        h1{
            font-size:30px;
            margin-bottom:10px;
            color:#222;
        }

        p{
            margin-bottom:30px;
            font-style:italic;
        }

        table{
            width:100%;
            border-spacing:15px;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            border: white;
            font-size:15px;
        }

        textarea{
            height:150px;
        }

        button{
            background:#ff2f68;
            color:white;
            border:none;
            padding:12px 30px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div>

    <h1 align="center">CONTACT FORM</h1>

    <p align="center">Shape your future web project with sharp design and refine coded functions.</p>

    <table align="center">

        <tr>
            <td>
                <label>Name<sup>*</sup></label><br>
                <input type="text">
            </td>

            <td>
                <label>Email<sup>*</sup></label><br>
                <input type="email">
            </td>

            <td>
                <label>Phone</label><br>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td colspan="3">
                <label>Message</label><br>
                <textarea></textarea>
            </td>
        </tr>

        <tr>
            <td colspan="3">
                <button>SEND FORM</button>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
