<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(to bottom, #50348f, #4696b3);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contact-container{
            width:90%;
            max-width:900px;
            color:white;
            padding:40px;
        }

        h1{
            text-align:center;
            font-size:80px;
            font-weight:300;
            margin-bottom:20px;
        }

        .subtitle{
            text-align:center;
            font-size:20px;
            line-height:1.6;
            margin-bottom:50px;
            color:#f2f2f2;
        }

        label{
            display:block;
            font-size:18px;
            margin-bottom:10px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:18px;
            margin-bottom:35px;
            border:1px solid #ccc;
            border-radius:3px;
            font-size:18px;
            outline:none;
        }

        input:focus,
        textarea:focus{
            border:2px solid #0d8bd8;
        }

        textarea{
            resize:vertical;
            min-height:220px;
        }

        button{
            width:100%;
            padding:18px;
            background:#0d8bd8;
            color:white;
            border:none;
            font-size:22px;
            border-radius:3px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0873b1;
        }

        @media(max-width:768px){

            h1{
                font-size:50px;
            }

            .subtitle{
                font-size:18px;
            }

            input,
            textarea,
            button{
                font-size:16px;
            }

            .contact-container{
                padding:20px;
            }

        }

    </style>

</head>

<body>

<div class="contact-container">

    <h1>Contact Us</h1>

    <p class="subtitle">
        Got a question? We'd love to hear from you.
        Send us a message and we'll respond as soon as possible.
    </p>

    <form>

        <label for="name">Name <span>*</span></label>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
        >

        <label for="email">Email address <span>*</span></label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <label for="message">Message</label>
        <textarea
            id="message"
            name="message"
            placeholder="Write your message..."
        ></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

</body>
</html>
